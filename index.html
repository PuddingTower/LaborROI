<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaborROI - 这个B班值不值得上</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 React 核心库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <!-- 引入 Babel 转换 JSX -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        const FACTOR_OPTIONS = {
            education: [
                { label: '专科及以下 (系数: 0.8)', value: 0.8 },
                { label: '普通本科 (系数: 1.0)', value: 1.0 },
                { label: '高级本科/211/985 (系数: 1.2)', value: 1.2 },
                { label: '普通硕士 (系数: 1.4)', value: 1.4 },
                { label: '高级硕士 (系数: 1.6)', value: 1.6 },
                { label: '普通博士 (系数: 1.8)', value: 1.8 },
                { label: '高级博士 (系数: 2.0)', value: 2.0 },
            ],
            environment: [
                { label: '偏僻地区/工地 (系数: 0.8)', value: 0.8 },
                { label: '普通工厂/外包 (系数: 0.9)', value: 0.9 },
                { label: '普通写字楼 (系数: 1.0)', value: 1.0 },
                { label: '核心CBD/体制内 (系数: 1.1)', value: 1.1 },
            ],
            oppositeSex: [
                { label: '周围基本同性 (系数: 0.9)', value: 0.9 },
                { label: '男女均衡 (系数: 1.0)', value: 1.0 },
                { label: '高颜值异性极多 (系数: 1.1)', value: 1.1 },
            ],
            colleagues: [
                { label: '勾心斗角 (系数: 0.9)', value: 0.9 },
                { label: '基本普通 (系数: 1.0)', value: 1.0 },
                { label: '团队优秀 (系数: 1.05)', value: 1.05 },
            ],
            mentalPressure: [
                { label: '轻松愉快 (耗时 -1h)', value: -1.0 },
                { label: '正常压力 (耗时 +0h)', value: 0 },
                { label: '轻度PUA (耗时 +1.5h)', value: 1.5 },
                { label: '重度PUA (耗时 +3h)', value: 3.0 },
            ],
            regionTier: [
                { label: '一线城市 (基准 1.0)', value: 1.0 },
                { label: '新一线 (乘数 1.2)', value: 1.2 },
                { label: '二/三线 (乘数 1.4)', value: 1.4 },
                { label: '四线及以下 (乘数 1.7)', value: 1.7 },
            ]
        };

        function App() {
            const [formData, setFormData] = useState({
                monthlyPreTax: 15000,
                housingFundRate: 7,
                workDaysPerMonth: 21.75,
                workHours: 9,
                commuteHours: 1.5,
                slackHours: 2,
                education: 1.0,
                environment: 1.0,
                oppositeSex: 1.0,
                colleagues: 1.0,
                mentalPressure: 0,
                regionTier: 1.0,
                earlyStart: false
            });

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : parseFloat(value) || 0
                }));
            };

            const result = useMemo(() => {
                const { monthlyPreTax, housingFundRate, workDaysPerMonth, workHours, commuteHours, slackHours, education, environment, oppositeSex, colleagues, mentalPressure, regionTier, earlyStart } = formData;
                
                const socialInsuranceRate = 0.105;
                const fundRate = housingFundRate / 100;
                const deductions = monthlyPreTax * (socialInsuranceRate + fundRate);
                
                let taxableIncome = Math.max(0, monthlyPreTax - deductions - 5000);
                let tax = 0;
                if (taxableIncome <= 3000) tax = taxableIncome * 0.03;
                else if (taxableIncome <= 12000) tax = taxableIncome * 0.1 - 210;
                else if (taxableIncome <= 25000) tax = taxableIncome * 0.2 - 1410;
                else tax = taxableIncome * 0.25 - 2660; // 简化版个税逻辑

                const netIncome = monthlyPreTax - deductions - tax;
                const dailySalary = netIncome / workDaysPerMonth;
                const actualHourlyWage = dailySalary / (workHours + commuteHours);
                const pppHourlyWage = actualHourlyWage * regionTier;

                let effectiveTime = (workHours - slackHours) + (commuteHours * 1.5) + mentalPressure + (earlyStart ? 0.5 : 0);
                effectiveTime = Math.max(0.1, effectiveTime);

                const totalReturn = dailySalary * (environment * oppositeSex * colleagues);
                const totalCost = effectiveTime * education * 35;
                const score = totalReturn / totalCost;

                let assessment = { level: 'B', color: 'text-blue-600', bg: 'bg-blue-50', text: '等价交换。' };
                if (score < 0.8) assessment = { level: 'C', color: 'text-red-600', bg: 'bg-red-50', text: '极度剥削，建议准备简历。' };
                else if (score >= 1.5 && score < 2.0) assessment = { level: 'A', color: 'text-emerald-600', bg: 'bg-emerald-50', text: '优质资产，建议长期持有。' };
                else if (score >= 2.0) assessment = { level: 'S', color: 'text-purple-600', bg: 'bg-purple-50', text: '神仙岗位，击败99%的打工人。' };

                return { score: score.toFixed(3), assessment, metrics: { dailySalary: dailySalary.toFixed(0), pppHourlyWage: pppHourlyWage.toFixed(1), effectiveTime: effectiveTime.toFixed(1) } };
            }, [formData]);

            return (
                <div className="max-w-4xl mx-auto py-8 px-4">
                    <div className="bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-200">
                        <div className="p-6 bg-slate-900 text-white">
                            <h1 className="text-2xl font-extrabold tracking-tight">LaborROI <span className="text-slate-400 font-normal text-base ml-2">v2.1</span></h1>
                            <p className="text-slate-400 text-sm mt-1">基于购买力平价(PPP)与物理守恒逻辑的工作效用分析</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-8 p-6">
                            <div className="space-y-6">
                                <div>
                                    <h2 className="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">核心投入产出数据</h2>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs text-slate-500 mb-1">税前月薪 (¥)</label>
                                            <input type="number" name="monthlyPreTax" value={formData.monthlyPreTax} onChange={handleInputChange} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-xs text-slate-500 mb-1">通勤总时长 (h)</label>
                                            <input type="number" name="commuteHours" value={formData.commuteHours} onChange={handleInputChange} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="block text-xs text-slate-500 mb-2">精神内耗与管理压力</label>
                                    <select name="mentalPressure" value={formData.mentalPressure} onChange={handleInputChange} className="w-full bg-slate-50 border border-slate-200 rounded-lg p-2 text-sm outline-none">
                                        {FACTOR_OPTIONS.mentalPressure.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs text-slate-500 mb-2">所在城市能级 (PPP权重)</label>
                                    <select name="regionTier" value={formData.regionTier} onChange={handleInputChange} className="w-full bg-emerald-50 border border-emerald-100 text-emerald-900 rounded-lg p-2 text-sm outline-none">
                                        {FACTOR_OPTIONS.regionTier.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                    </select>
                                </div>

                                <div className="flex items-center space-x-3 p-3 bg-slate-50 rounded-lg border border-slate-100">
                                    <input type="checkbox" name="earlyStart" checked={formData.earlyStart} onChange={handleInputChange} className="w-4 h-4 text-blue-600 rounded" />
                                    <span className="text-xs font-medium text-slate-600 uppercase tracking-wide">强制早起 (8:30前上班)</span>
                                </div>
                            </div>

                            <div className="bg-slate-50 rounded-xl p-6 flex flex-col items-center justify-center text-center border border-slate-100">
                                <span className="text-xs font-bold text-slate-400 uppercase mb-2">综合效用指数 (CUI)</span>
                                <div className={`text-7xl font-black ${result.assessment.color} mb-4 tracking-tighter`}>{result.score}</div>
                                <div className={`px-4 py-2 rounded-full font-bold text-sm ${result.assessment.bg} ${result.assessment.color} mb-4`}>
                                    {result.assessment.level} 类资产 / {result.assessment.text}
                                </div>
                                <div className="w-full space-y-2 border-t border-slate-200 pt-4">
                                    <div className="flex justify-between text-xs">
                                        <span className="text-slate-400">PPP等效购买力时薪</span>
                                        <span className="font-bold text-emerald-600">¥ {result.metrics.pppHourlyWage}/h</span>
                                    </div>
                                    <div className="flex justify-between text-xs">
                                        <span className="text-slate-400">等效生命总耗时</span>
                                        <span className="font-bold text-slate-700">{result.metrics.effectiveTime} h</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <footer className="mt-6 text-center text-slate-400 text-[10px] uppercase tracking-widest">
                        Model optimized for modern labor markets • PuddingTower
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

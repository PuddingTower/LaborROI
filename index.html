<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工作效用指数评估系统 (ROI Analyzer) - Rigorous Edition</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useMemo } = React;

        // --- 城市微观经济学与税法数据字典 (City Micro-Economic Dictionary) ---
        // 参数说明：
        // minBase/maxBase: 预估的社保/公积金缴费基数上下限
        // rentIndex: 租金指数 (以一线城市为 1.0)
        // cpiIndex: 基础物价指数 (以一线城市为 1.0，各线城市差异远小于租金)
        const CITY_DATA = {
            'tier-1': { label: '一线城市 (北上广深)', minBase: 6520, maxBase: 36000, rentIndex: 1.0, cpiIndex: 1.0 },
            'tier-new-1': { label: '新一线 (杭蓉汉宁等)', minBase: 4250, maxBase: 24000, rentIndex: 0.65, cpiIndex: 0.90 },
            'tier-2': { label: '普通二线 (无锡/佛山/合肥等)', minBase: 3800, maxBase: 21000, rentIndex: 0.45, cpiIndex: 0.85 },
            'tier-3': { label: '三线及以下 (普通地级市)', minBase: 3500, maxBase: 18000, rentIndex: 0.30, cpiIndex: 0.80 },
            'tier-4': { label: '四五线及县城 (十八线)', minBase: 3000, maxBase: 15000, rentIndex: 0.15, cpiIndex: 0.70 },
        };

        const FACTOR_OPTIONS = {
            education: [
                { label: '专科及以下 (系数: 0.8)', value: 0.8 },
                { label: '普通本科 (系数: 1.0)', value: 1.0 },
                { label: '高级本科/211/985 (系数: 1.2)', value: 1.2 },
                { label: '普通硕士 (系数: 1.4)', value: 1.4 },
                { label: '高级硕士 (系数: 1.6)', value: 1.6 },
                { label: '博士及以上 (系数: 1.8)', value: 1.8 }
            ],
            environment: [
                { label: '偏僻地区/工地/艰苦户外 (系数: 0.8)', value: 0.8 },
                { label: '普通工厂/外包 (系数: 0.9)', value: 0.9 },
                { label: '普通写字楼 (系数: 1.0)', value: 1.0 },
                { label: '核心CBD/体制内 (系数: 1.1)', value: 1.1 },
            ],
            oppositeSex: [
                { label: '周围基本同性/无吸引力 (系数: 0.9)', value: 0.9 },
                { label: '男女均衡/正常水平 (系数: 1.0)', value: 1.0 },
                { label: '高颜值异性极多 (系数: 1.1)', value: 1.1 },
            ],
            colleagues: [
                { label: '勾心斗角/甩锅极多 (系数: 0.9)', value: 0.9 },
                { label: '基本是普通同事 (系数: 1.0)', value: 1.0 },
                { label: '团队极其优秀/互帮互助 (系数: 1.05)', value: 1.05 },
            ],
            mentalPressure: [
                { label: '轻松愉快/自由度高 (耗时 -1h)', value: -1.0 },
                { label: '正常工作压力 (耗时 +0h)', value: 0 },
                { label: '轻度PUA/微观管理 (耗时 +1.5h)', value: 1.5 },
                { label: '重度PUA/高压职场 (耗时 +3h)', value: 3.0 },
                { label: '抑郁边缘/随时崩溃 (耗时 +5h)', value: 5.0 },
            ]
        };

        function App() {
            // --- State Management ---
            const [formData, setFormData] = useState({
                cityTier: 'tier-1',
                monthlyPreTax: 15000,
                housingFundRate: 7, 
                specialDeduction: 1500, // 新增：专项附加扣除预估 (租房/赡养等)
                workDaysPerMonth: 21.75,
                workHours: 9,
                commuteHours: 1.5,
                slackHours: 2,
                education: 1.0,
                environment: 1.0,
                oppositeSex: 1.0,
                colleagues: 1.0,
                mentalPressure: 0,
                earlyStart: false
            });

            const handleInputChange = (e) => {
                const { name, value, type, checked } = e.target;
                setFormData(prev => ({
                    ...prev,
                    [name]: type === 'checkbox' ? checked : (name === 'cityTier' ? value : parseFloat(value) || 0)
                }));
            };

            // --- 核心算法推理引擎 (Core Calculation Engine) ---
            const analysisResult = useMemo(() => {
                const {
                    cityTier, monthlyPreTax, housingFundRate, specialDeduction, workDaysPerMonth,
                    workHours, commuteHours, slackHours,
                    education, environment, oppositeSex, colleagues,
                    mentalPressure, earlyStart
                } = formData;

                const cityInfo = CITY_DATA[cityTier];

                // 1. 税基边界约束算法 (Boundary-Constrained Tax Base)
                // 确保缴费基数不低于下限，不高于上限
                const contributionBase = Math.min(Math.max(monthlyPreTax, cityInfo.minBase), cityInfo.maxBase);
                
                // 五险个人部分预估 (养老8%, 医疗2%, 失业0.5%) = 10.5%
                const socialInsuranceRate = 0.105;
                const fundRateDec = (parseFloat(housingFundRate) || 0) / 100;
                
                const socialDeduction = contributionBase * socialInsuranceRate;
                const fundDeduction = contributionBase * fundRateDec;
                const totalDeductions = socialDeduction + fundDeduction;

                // 2. 个税阶梯算法 (Progressive Tax Model)
                // 扣除5000免征额，扣除专项附加，扣除社保公积金
                let taxableIncome = monthlyPreTax - totalDeductions - 5000 - specialDeduction;
                let tax = 0;
                if (taxableIncome > 0) {
                    if (taxableIncome <= 3000) tax = taxableIncome * 0.03;
                    else if (taxableIncome <= 12000) tax = taxableIncome * 0.1 - 210;
                    else if (taxableIncome <= 25000) tax = taxableIncome * 0.2 - 1410;
                    else if (taxableIncome <= 35000) tax = taxableIncome * 0.25 - 2660;
                    else if (taxableIncome <= 55000) tax = taxableIncome * 0.3 - 4410;
                    else if (taxableIncome <= 80000) tax = taxableIncome * 0.35 - 7160;
                    else tax = taxableIncome * 0.45 - 15160;
                }
                
                // 真实税后净收入
                const netMonthlyIncome = monthlyPreTax - totalDeductions - tax;
                const dailySalary = workDaysPerMonth > 0 ? (netMonthlyIncome / workDaysPerMonth) : 0;

                // 3. 二维购买力平价模型 (2D Purchasing Power Parity)
                // 设定基础模型权重：生活成本 = 35% 租金/房贷权重 + 65% 日常消费权重
                // 以一线城市为基准 1.0 计算出当地的 Cost of Living (COL) 指数
                const RENT_WEIGHT = 0.35;
                const CPI_WEIGHT = 0.65;
                const colIndex = (cityInfo.rentIndex * RENT_WEIGHT) + (cityInfo.cpiIndex * CPI_WEIGHT);
                
                // PPP 平价日薪 = 绝对日薪 / COL指数 (指数越低，购买力越强)
                const pppDailySalary = dailySalary / colIndex;

                // 真实物理耗时与平价时薪
                const truePhysicalHours = workHours + commuteHours;
                const actualHourlyWage = truePhysicalHours > 0 ? (dailySalary / truePhysicalHours) : 0;
                const pppHourlyWage = truePhysicalHours > 0 ? (pppDailySalary / truePhysicalHours) : 0;

                // 4. 收益模块计算 (Return)
                const envGain = environment * oppositeSex * colleagues;
                const totalReturn = pppDailySalary * envGain;

                // 5. 成本模块计算 (Cost)
                // 修正：通勤折损率1.5，摸鱼抵扣，情绪劳动直接等效为时间
                let effectiveTime = (workHours - slackHours) + (commuteHours * 1.5) + mentalPressure;
                if (effectiveTime <= 0) effectiveTime = 0.1; // 防御性保护

                // 强制早起剥夺惩罚
                if (earlyStart) effectiveTime += 0.5;

                // 量纲常数缩放，保持与原体系评价线(0.8, 1.5)大致一致
                // 由于引入了更真实的 PPP，常数从35调整至 45 吸收通胀容差
                const totalCost = effectiveTime * education * 45; 

                // 6. 最终综合指数 (CUI)
                const score = totalCost > 0 ? (totalReturn / totalCost) : 0;

                // 定性评估判定树
                let assessment = { level: '', color: '', bg: '', text: '' };
                if (score < 0.8) {
                    assessment = { level: 'C 类 / 极度剥削', color: 'text-red-600', bg: 'bg-red-50 border-red-200', text: '此工作实质上是对劳动者生命周期的净消耗，附加了重度精神内耗或被高昂的生活成本吞噬。建议立即开启静默离职模式或准备跑路。' };
                } else if (score >= 0.8 && score < 1.5) {
                    assessment = { level: 'B 类 / 正常交易', color: 'text-blue-600', bg: 'bg-blue-50 border-blue-200', text: '符合市场规律的等价交换。无显著的附加剥削，维持了基本的投入产出平衡。' };
                } else if (score >= 1.5 && score < 2.0) {
                    assessment = { level: 'A 类 / 优质资产', color: 'text-emerald-600', bg: 'bg-emerald-50 border-emerald-200', text: '具备较高的边际收益率，环境或当地购买力平价存在显著正向溢价，建议长期持有该岗位。' };
                } else {
                    assessment = { level: 'S 类 / 顶级复利', color: 'text-purple-600', bg: 'bg-purple-50 border-purple-200', text: '稀缺的神仙级岗位。考虑到当地物价与您的工作强度，您的投入产出比已击败系统内 99% 的齿轮，请低调行事。' };
                }

                return {
                    score: score.toFixed(3),
                    assessment,
                    metrics: {
                        netMonthlyIncome: netMonthlyIncome.toFixed(0),
                        colIndex: colIndex.toFixed(2),
                        actualDailySalary: dailySalary.toFixed(1),
                        actualHourlyWage: actualHourlyWage.toFixed(1),
                        pppHourlyWage: pppHourlyWage.toFixed(1),
                        envGain: envGain.toFixed(2),
                        education: education.toFixed(1),
                        totalReturn: totalReturn.toFixed(1),
                        effectiveTime: effectiveTime.toFixed(1),
                        totalCost: totalCost.toFixed(1)
                    }
                };
            }, [formData]);

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-800">
                    <div className="max-w-6xl mx-auto space-y-6">
                        
                        {/* Header */}
                        <header className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                            <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight flex items-center">
                                工作效用指数评估系统 
                                <span className="ml-3 px-2 py-1 bg-slate-800 text-white text-xs font-medium rounded uppercase tracking-wider">Rigorous V3</span>
                            </h1>
                            <p className="text-slate-500 mt-2 text-sm leading-relaxed max-w-4xl">
                                基于宏观经济学与税法边界约束的重构版本。引入<strong className="text-slate-700">城市基数双轨制</strong>与<strong className="text-slate-700">二维购买力平价(PPP)模型</strong>，剥离不可贸易品(租金)差异，提供最真实的职场 ROI 定量分析。
                            </p>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-6">
                            
                            {/* Left Column: Inputs (Span 7) */}
                            <div className="lg:col-span-7 space-y-6">
                                
                                {/* 核心维度：经济与时空 */}
                                <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="text-lg font-bold border-b border-slate-100 pb-3 mb-5 flex items-center text-slate-800">
                                        <svg className="w-5 h-5 mr-2 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                        经济与时空基准约束
                                    </h2>
                                    
                                    {/* 城市选择 - 占据整行 */}
                                    <div className="mb-5">
                                        <label className="block text-sm font-semibold text-slate-700 mb-1">所在城市能级 (决定社保上下限及区域生活成本)</label>
                                        <select name="cityTier" value={formData.cityTier} onChange={handleInputChange} className="w-full p-3 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50 text-slate-900 shadow-sm">
                                            {Object.entries(CITY_DATA).map(([key, data]) => (
                                                <option key={key} value={key}>{data.label} | 基数限额: {data.minBase}-{data.maxBase} | 综合COL指数: {((data.rentIndex*0.35)+(data.cpiIndex*0.65)).toFixed(2)}</option>
                                            ))}
                                        </select>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">税前月薪 (元)</label>
                                            <input type="number" name="monthlyPreTax" value={formData.monthlyPreTax} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">公积金比例 (%)</label>
                                            <input type="number" name="housingFundRate" value={formData.housingFundRate} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">个税专项附加扣除预估 (元/月)</label>
                                            <input type="number" name="specialDeduction" value={formData.specialDeduction} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                            <p className="text-xs text-slate-400 mt-1">含租房/房贷/赡养/子女等</p>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">法定计薪天数</label>
                                            <input type="number" name="workDaysPerMonth" value={formData.workDaysPerMonth} step="0.01" onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-slate-50" />
                                        </div>
                                        
                                        <div className="md:col-span-2 border-t border-slate-100 pt-4 mt-2">
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">规定工时 (h)</label>
                                                    <input type="number" name="workHours" value={formData.workHours} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">通勤总耗时 (h)</label>
                                                    <input type="number" name="commuteHours" value={formData.commuteHours} step="0.1" onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-medium text-slate-700 mb-1">实际摸鱼 (h)</label>
                                                    <input type="number" name="slackHours" value={formData.slackHours} step="0.1" onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none" />
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="mt-5 flex items-center bg-amber-50 p-3 rounded-lg border border-amber-200">
                                        <input type="checkbox" id="earlyStart" name="earlyStart" checked={formData.earlyStart} onChange={handleInputChange} className="w-4 h-4 text-amber-600 rounded focus:ring-amber-500 cursor-pointer" />
                                        <label htmlFor="earlyStart" className="ml-3 text-sm font-medium text-amber-900 cursor-pointer select-none">
                                            睡眠剥夺惩罚：是否强制要求在 8:30 前打卡上班？
                                        </label>
                                    </div>
                                </section>

                                {/* 情绪劳动与环境增益 */}
                                <section className="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                    <h2 className="text-lg font-bold border-b border-slate-100 pb-3 mb-5 flex items-center text-slate-800">
                                        <svg className="w-5 h-5 mr-2 text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                        情绪劳动与无形资产估值
                                    </h2>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="md:col-span-2">
                                            <label className="block text-sm font-bold text-slate-800 mb-1">情绪劳动与精神内耗 (直接折算为虚拟耗时)</label>
                                            <select name="mentalPressure" value={formData.mentalPressure} onChange={handleInputChange} className="w-full p-3 border-2 border-rose-200 rounded-xl focus:ring-2 focus:ring-rose-400 outline-none bg-rose-50 text-rose-900 shadow-sm">
                                                {FACTOR_OPTIONS.mentalPressure.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">学历机会成本系数</label>
                                            <select name="education" value={formData.education} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                                {FACTOR_OPTIONS.education.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">物理办公环境</label>
                                            <select name="environment" value={formData.environment} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                                {FACTOR_OPTIONS.environment.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">异性环境增益</label>
                                            <select name="oppositeSex" value={formData.oppositeSex} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                                {FACTOR_OPTIONS.oppositeSex.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                            </select>
                                        </div>
                                        <div>
                                            <label className="block text-sm font-medium text-slate-700 mb-1">团队协作氛围</label>
                                            <select name="colleagues" value={formData.colleagues} onChange={handleInputChange} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                                {FACTOR_OPTIONS.colleagues.map(opt => <option key={opt.label} value={opt.value}>{opt.label}</option>)}
                                            </select>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            {/* Right Column: Output / Dashboard (Span 5) */}
                            <div className="lg:col-span-5">
                                <div className="bg-white p-6 rounded-2xl shadow-xl border-t-4 border-slate-800 sticky top-6">
                                    <h2 className="text-slate-400 font-bold uppercase tracking-widest text-xs mb-3">经宏观校验的最终综合指数 (CUI)</h2>
                                    
                                    <div className="flex items-end mb-4">
                                        <span className={`text-6xl font-black ${analysisResult.assessment.color} tracking-tighter drop-shadow-sm`}>
                                            {analysisResult.score}
                                        </span>
                                    </div>

                                    <div className="w-full bg-slate-100 rounded-full h-2 mb-2 overflow-hidden">
                                        <div 
                                            className={`h-2 rounded-full transition-all duration-700 ease-out ${analysisResult.assessment.color.replace('text-', 'bg-')}`} 
                                            style={{ width: `${Math.min((analysisResult.score / 2.5) * 100, 100)}%` }}
                                        ></div>
                                    </div>
                                    <div className="flex justify-between text-[10px] text-slate-400 font-mono mb-6 uppercase tracking-wider">
                                        <span>&lt; 0.8 剥削区</span>
                                        <span>1.5 收益拐点</span>
                                        <span>2.0+ 超额溢价</span>
                                    </div>

                                    <div className={`p-5 rounded-xl mb-6 border ${analysisResult.assessment.bg}`}>
                                        <h3 className={`font-bold text-lg ${analysisResult.assessment.color} mb-2`}>
                                            {analysisResult.assessment.level}
                                        </h3>
                                        <p className="text-sm text-slate-700 leading-relaxed font-medium">
                                            {analysisResult.assessment.text}
                                        </p>
                                    </div>

                                    {/* Detailed Metrics Table */}
                                    <div className="space-y-4 pt-4 border-t border-slate-100">
                                        <h4 className="text-xs font-bold text-slate-400 uppercase tracking-wider">核心推演数据</h4>
                                        
                                        <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-3">
                                            <div className="flex justify-between items-center text-sm">

                                        <div className="mt-4 pt-3 border-t border-slate-800 flex justify-between items-center font-mono text-sm">
                                            <span className="text-slate-400">∑R = {analysisResult.metrics.totalReturn}</span>
                                            <span className="text-slate-600 px-2">/</span>

                                            <span className="text-blue-400 font-bold ml-auto text-lg">= {analysisResult.score}</span>

                                </div>
                            </div>

                        </div>
